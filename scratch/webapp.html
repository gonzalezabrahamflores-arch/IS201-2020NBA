<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Scouting Challenge | 50-Question Master Edition</title>
    <link rel="stylesheet" href="../css/scratchstyles.css">
    
    <style>
        .trivia-container {
            background: #ffffff;
            color: #333;
            padding: 40px;
            border-radius: 20px;
            max-width: 800px;
            margin: 40px auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }
        .question-box {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1d428a;
            margin-bottom: 30px;
            border-left: 6px solid #c8102e;
            padding-left: 20px;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border: 2px solid #1d428a;
            border-radius: 12px;
            background: white;
            color: #1d428a;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
        }
        .option-btn:hover {
            background: #1d428a;
            color: white;
            transform: scale(1.02);
        }
        .rank-tag {
            background: #c8102e;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav-box">
        <div class="nav-container">
            <a href="../index.html" class="nav-link">← Executive Portfolio</a>
            <div class="nav-group">
                <a href="nbashots.html" class="nav-link">Back to Analytics</a>
            </div>
        </div>
    </div>

    <div class="content-box">
        <header class="page-header text-center">
            <h1>2020 Master Scouting Challenge</h1>
            <p class="tagline">10 Random Questions. 50 Possible Challenges. Do you have the data?</p>
        </header>

        <div id="quiz-ui" class="trivia-container">
            <span id="progress" style="color:#c8102e; font-weight:bold; letter-spacing:2px;">Question 1 of 10</span>
            <div id="question" class="question-box">Initializing Scouting Database...</div>
            <div id="options"></div>
        </div>

        <div id="results-ui" class="trivia-container hidden text-center">
            <h2 id="final-score" style="font-size: 4rem; color: #1d428a;">0 / 10</h2>
            <div id="rank" class="rank-tag">Calculating Fan Level...</div>
            <div style="margin-top: 30px;">
                <button onclick="location.reload()" class="option-btn" style="text-align:center;">New Random Draft</button>
            </div>
        </div>
    </div>

    <script>
        const masterBank = [
            // UTAH JAZZ / 2020 FOCUS
            { q: "Which Utah Jazz player had the first confirmed case of COVID-19 in the NBA?", a: "Rudy Gobert", options: ["Donovan Mitchell", "Rudy Gobert", "Joe Ingles", "Jordan Clarkson"] },
            { q: "How many points did Donovan Mitchell score in Game 1 of the 2020 playoffs vs Denver?", a: "57", options: ["45", "50", "57", "62"] },
            { q: "Who was the Jazz's leading scorer in the 2019-20 regular season?", a: "Donovan Mitchell", options: ["Rudy Gobert", "Bojan Bogdanovic", "Donovan Mitchell", "Mike Conley"] },
            { q: "Which Jazz player is famous for his 'Jingles' nickname?", a: "Joe Ingles", options: ["Joe Ingles", "Jordan Clarkson", "Royce O'Neale", "Georges Niang"] },
            { q: "The Jazz lost a heartbreaking 2020 Game 7 to Denver by how many points?", a: "2", options: ["1", "2", "5", "10"] },
            { q: "Which Jazz reserve won NBA Sixth Man of the Year in 2021 (for the 2020 season success)?", a: "Jordan Clarkson", options: ["Jordan Clarkson", "Joe Ingles", "Lou Williams", "Montrezl Harrell"] },
            { q: "Who was the coach of the Utah Jazz during the 2020 Bubble?", a: "Quin Snyder", options: ["Jerry Sloan", "Quin Snyder", "Will Hardy", "Ty Corbin"] },
            { q: "Rudy Gobert won his 2nd Defensive Player of the Year award in what year range?", a: "2018-2019", options: ["2016-2017", "2017-2018", "2018-2019", "2019-2020"] },
            { q: "Which team did the Jazz beat in their first game of the 2020 Orlando Bubble?", a: "New Orleans Pelicans", options: ["Denver Nuggets", "New Orleans Pelicans", "LA Lakers", "OKC Thunder"] },
            { q: "What was the name of the arena where the Jazz played in Salt Lake City in 2020?", a: "Vivint Smart Home Arena", options: ["Delta Center", "EnergySolutions Arena", "Vivint Smart Home Arena", "Maverik Center"] },

            // THE BUBBLE / 2020 SEASON
            { q: "In which city was the 2020 NBA 'Bubble' located?", a: "Orlando", options: ["Miami", "Orlando", "Tampa", "Las Vegas"] },
            { q: "Who won the 2020 NBA Championship?", a: "LA Lakers", options: ["Miami Heat", "LA Lakers", "Milwaukee Bucks", "Boston Celtics"] },
            { q: "Who was the 2020 NBA Finals MVP?", a: "LeBron James", options: ["Anthony Davis", "Jimmy Butler", "LeBron James", "Bam Adebayo"] },
            { q: "Which team was the 'Cinderella' story of the Bubble, going 8-0 in seeding games?", a: "Phoenix Suns", options: ["Portland Trail Blazers", "Phoenix Suns", "Memphis Grizzlies", "San Antonio Spurs"] },
            { q: "Who did the Lakers defeat in the 2020 NBA Finals?", a: "Miami Heat", options: ["Denver Nuggets", "Miami Heat", "Boston Celtics", "Milwaukee Bucks"] },
            { q: "T.J. Warren became a Bubble legend by scoring how many points in his first game?", a: "53", options: ["40", "45", "50", "53"] },
            { q: "Which player hit a game-winning buzzer-beater for the Lakers in Game 2 of the WCF?", a: "Anthony Davis", options: ["LeBron James", "Anthony Davis", "Kyle Kuzma", "Rajon Rondo"] },
            { q: "The 2020 season was suspended on what month and day?", a: "March 11", options: ["March 1", "March 11", "March 15", "April 1"] },
            { q: "How many NBA teams were invited to the Orlando Bubble?", a: "22", options: ["16", "20", "22", "30"] },
            { q: "Which team blew a 3-1 lead to the Denver Nuggets in the 2020 playoffs?", a: "LA Clippers", options: ["Utah Jazz", "LA Clippers", "Both Jazz & Clippers", "Dallas Mavericks"] },

            // ALL-STAR 2020
            { q: "Where was the 2020 All-Star Game held?", a: "Chicago", options: ["New York", "Chicago", "Los Angeles", "Toronto"] },
            { q: "Who won the 2020 All-Star Game MVP?", a: "Kawhi Leonard", options: ["LeBron James", "Giannis Antetokounmpo", "Kawhi Leonard", "Anthony Davis"] },
            { q: "Who won the 2020 NBA Slam Dunk Contest?", a: "Derrick Jones Jr.", options: ["Aaron Gordon", "Derrick Jones Jr.", "Dwight Howard", "Pat Connaughton"] },
            { q: "Who won the 2020 NBA Three-Point Contest?", a: "Buddy Hield", options: ["Devin Booker", "Buddy Hield", "Trae Young", "Davis Bertans"] },
            { q: "The 2020 All-Star Game format featured a target score of +24 points to honor whom?", a: "Kobe Bryant", options: ["Kobe Bryant", "David Stern", "Michael Jordan", "Magic Johnson"] },
            { q: "Which rookie played in the 2020 Rising Stars Challenge for Team World?", a: "Luka Doncic", options: ["Ja Morant", "Zion Williamson", "Luka Doncic", "RJ Barrett"] },
            { q: "Who was the captain of the Eastern Conference All-Stars in 2020?", a: "Giannis Antetokounmpo", options: ["Kevin Durant", "Giannis Antetokounmpo", "Joel Embiid", "Kemba Walker"] },
            { q: "Which Heat player made his All-Star debut in 2020 alongside Jimmy Butler?", a: "Bam Adebayo", options: ["Tyler Herro", "Bam Adebayo", "Duncan Robinson", "Goran Dragic"] },
            { q: "Who was the captain of the Western Conference All-Stars in 2020?", a: "LeBron James", options: ["Stephen Curry", "Kawhi Leonard", "LeBron James", "James Harden"] },
            { q: "Which All-Star starter in 2020 was playing for the OKC Thunder?", a: "Chris Paul", options: ["Chris Paul", "Shai Gilgeous-Alexander", "Dennis Schroder", "Steven Adams"] },

            // GENERAL 2020 STATS/TRIVIA
            { q: "Who was the 2019-20 NBA scoring leader?", a: "James Harden", options: ["LeBron James", "James Harden", "Bradley Beal", "Damian Lillard"] },
            { q: "Who won the 2019-20 NBA Rookie of the Year?", a: "Ja Morant", options: ["Zion Williamson", "Ja Morant", "Kendrick Nunn", "RJ Barrett"] },
            { q: "Who won the 2019-20 NBA Most Improved Player?", a: "Brandon Ingram", options: ["Bam Adebayo", "Brandon Ingram", "Luka Doncic", "Devonte' Graham"] },
            { q: "Who was the 2019-20 NBA Defensive Player of the Year?", a: "Giannis Antetokounmpo", options: ["Rudy Gobert", "Anthony Davis", "Giannis Antetokounmpo", "Ben Simmons"] },
            { q: "Which player had the most triple-doubles in the 2019-20 season?", a: "Luka Doncic", options: ["LeBron James", "Luka Doncic", "Nikola Jokic", "Russell Westbrook"] },
            { q: "Who was the #1 pick in the 2019 NBA Draft?", a: "Zion Williamson", options: ["Zion Williamson", "Ja Morant", "RJ Barrett", "De'Andre Hunter"] },
            { q: "Vince Carter retired in 2020. How many decades did his career span?", a: "4", options: ["2", "3", "4", "5"] },
            { q: "Which team did Chris Paul lead to a surprise playoff berth in 2020?", a: "OKC Thunder", options: ["Phoenix Suns", "OKC Thunder", "Houston Rockets", "LA Clippers"] },
            { q: "Who was the head coach of the 2020 Champion Lakers?", a: "Frank Vogel", options: ["Ty Lue", "Frank Vogel", "Jason Kidd", "Doc Rivers"] },
            { q: "Which player scored 60 points in a game during the 2019-20 season?", a: "James Harden", options: ["Damian Lillard", "James Harden", "Bradley Beal", "Trae Young"] },

            // EXTRA JAZZ/NBA 2020
            { q: "What is the name of the Utah Jazz mascot?", a: "Jazz Bear", options: ["Jazz Bear", "The Coyote", "Benny the Bull", "Hugo"] },
            { q: "Which Jazz player hit a game-winner in the 2020 opener against the Pelicans?", a: "Brandon Ingram (missed)", options: ["Donovan Mitchell", "Mike Conley", "Rudy Gobert", "Bojan Bogdanovic"] },
            { q: "The 2020 Jazz traded for which Sixth Man candidate from the Cavs?", a: "Jordan Clarkson", options: ["Jordan Clarkson", "Larry Nance Jr.", "Kevin Love", "Collin Sexton"] },
            { q: "Which player led the NBA in assists per game in 2019-20?", a: "LeBron James", options: ["Chris Paul", "LeBron James", "Luka Doncic", "Trae Young"] },
            { q: "Damian Lillard was named the 'Player of the Seeding Games' for what record?", a: "8-0", options: ["6-2", "7-1", "8-0", "5-3"] },
            { q: "Which team drafted Zion Williamson?", a: "New Orleans Pelicans", options: ["New York Knicks", "Memphis Grizzlies", "New Orleans Pelicans", "Cleveland Cavaliers"] },
            { q: "Which legendary NBA Commissioner passed away in early 2020?", a: "David Stern", options: ["David Stern", "Adam Silver", "Larry O'Brien", "Walter Kennedy"] },
            { q: "In 2020, Trae Young became the first player to start an All-Star game for which team in decades?", a: "Atlanta Hawks", options: ["Charlotte Hornets", "Atlanta Hawks", "Orlando Magic", "Indiana Pacers"] },
            { q: "Which 2020 All-Star is known as 'The Greek Freak'?", a: "Giannis Antetokounmpo", options: ["Giannis Antetokounmpo", "Kostas Antetokounmpo", "Thanasis Antetokounmpo", "Luka Doncic"] },
            { q: "Which 2020 All-Star is known as 'The Joker'?", a: "Nikola Jokic", options: ["Luka Doncic", "Nikola Jokic", "Joel Embiid", "Karl-Anthony Towns"] }
        ];

        let activeQuestions = [];
        let currentIdx = 0;
        let score = 0;

        function startQuiz() {
            // Shuffle the bank and pick 10
            activeQuestions = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, 10);
            renderQuestion();
        }

        function renderQuestion() {
            const data = activeQuestions[currentIdx];
            document.getElementById('progress').innerText = `Question ${currentIdx + 1} of 10`;
            document.getElementById('question').innerText = data.q;
            
            const btnContainer = document.getElementById('options');
            btnContainer.innerHTML = '';

            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = 'option-btn';
                btn.onclick = () => handleChoice(opt);
                btnContainer.appendChild(btn);
            });
        }

        function handleChoice(choice) {
            if (choice === activeQuestions[currentIdx].a) {
                score++;
            }
            currentIdx++;
            if (currentIdx < 10) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / 10`;
            
            let rank = "";
            if (score >= 9) rank = "NBA SUPER FAN 🏆";
            else if (score >= 6) rank = "NBA Fan 🏀";
            else if (score >= 3) rank = "Casual Fan 🍿";
            else rank = "Not a Fan 🧊";
            
            document.getElementById('rank').innerText = rank;
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
